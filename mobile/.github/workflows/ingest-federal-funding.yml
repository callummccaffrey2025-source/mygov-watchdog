name: Ingest Federal Funding

# Scrapes Department of Infrastructure project pages + GrantConnect RSS +
# scans representative_updates for funding-pattern statements, writing
# verified entries to local_announcements.

on:
  schedule:
    # 22:00 UTC daily = 08:00 AEST. Sits after ingest-mp-statements (21:30
    # UTC) so the statements scan has fresh data from that run.
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing to Supabase"
        required: false
        type: boolean
        default: false
      source:
        description: "Limit to single source (infra / grants / statements / all)"
        required: false
        type: string
        default: "all"

concurrency:
  group: ingest-federal-funding
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: mobile/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.source }}" ] && [ "${{ inputs.source }}" != "all" ]; then
            ARGS="$ARGS --source ${{ inputs.source }}"
          fi
          python scripts/ingest_federal_funding.py $ARGS
