name: Pipeline — Data Ingestion & Health Check

# Runs the Verity data pipeline on GitHub's servers.
# Works when your laptop is closed.

on:
  schedule:
    # Full pipeline: 6am AEST (20:00 UTC previous day)
    - cron: '0 20 * * *'
    # News refresh: 12pm, 6pm, midnight AEST
    - cron: '0 2,8,14 * * *'

  workflow_dispatch:
    inputs:
      stage:
        description: 'Pipeline stage to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - news
          - votes
          - summaries
          - health

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      THEYVOTEFORYOU_API_KEY: ${{ secrets.THEYVOTEFORYOU_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
      MEDIASTACK_KEY: ${{ secrets.MEDIASTACK_KEY }}
      OPENAUSTRALIA_API_KEY: ${{ secrets.OPENAUSTRALIA_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install supabase python-dotenv requests beautifulsoup4 lxml feedparser anthropic

      # ── Determine what to run ──────────────────────────────────────────
      # Full pipeline runs at 20:00 UTC. Other cron times are news-only.
      # Manual dispatch uses the stage input.

      - name: News ingestion
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.stage == 'full' ||
          github.event.inputs.stage == 'news'
        run: python scripts/ingest_news.py --fresh
        timeout-minutes: 10
        continue-on-error: true

      - name: Votes ingestion
        if: >
          (github.event.schedule == '0 20 * * *') ||
          github.event.inputs.stage == 'full' ||
          github.event.inputs.stage == 'votes'
        run: python scripts/ingest_votes.py
        timeout-minutes: 10
        continue-on-error: true

      - name: AI summaries
        if: >
          (github.event.schedule == '0 20 * * *') ||
          github.event.inputs.stage == 'full' ||
          github.event.inputs.stage == 'summaries'
        run: python scripts/generate_ai_summaries.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Health check
        if: >
          (github.event.schedule == '0 20 * * *') ||
          github.event.inputs.stage == 'full' ||
          github.event.inputs.stage == 'health'
        run: python scripts/data_monitor.py
        timeout-minutes: 5

  notify:
    runs-on: ubuntu-latest
    needs: ingest
    if: failure()
    steps:
      - name: Alert on failure
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text":"⚠️ Verity pipeline failed — check GitHub Actions: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
