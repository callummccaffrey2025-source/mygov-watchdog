name: news-pipeline
description: |
  Ingests fresh news from NewsAPI, Google News RSS, and direct RSS feeds.
  Clusters articles into stories, computes bias/factuality/blindspot metrics,
  and backfills og:image thumbnails.
schedule: "0 20 * * *"  # 6:00 UTC daily = 6:00am AEST (EST/AEDT auto)
runtime: python:3.14
entrypoint: scripts/pipeline.py
working_directory: /Users/callummccaffrey/verity/mobile
timeout: 1800  # 30 min hard limit
env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
dependencies:
  python_packages:
    - python-dotenv
    - supabase
    - requests
    - feedparser
    - beautifulsoup4
    - lxml
    - anthropic
notifications:
  on_failure:
    - log_to: pipeline_runs
      status: error
  on_success:
    - log_to: pipeline_runs
      status: success
post_run:
  - script: scripts/generate_ai_summaries.py
    description: Generate AI summaries for any new stories with article_count >= 5
